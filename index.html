<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000408">
  <title>EY — Global Threat Monitor</title>
  <meta name="description" content="EY — Monitor global de amenazas en tiempo real">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <!-- Leaflet MarkerCluster CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/feed.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

<div id="app">

  <!-- ═══ HEADER ═══ -->
  <header id="header">
    <div class="header-left">
      <span class="header-logo-small">EY</span>
      <span class="header-version">v1.0</span>
    </div>

    <div class="header-center">
      <div id="utc-clock">00:00:00 UTC</div>
      <div id="utc-date">—</div>
    </div>

    <div class="header-right">
      <input
        type="text"
        id="location-search"
        placeholder="🔍 Buscar ubicación..."
        autocomplete="off"
      >
      <div class="api-indicators">
        <div class="api-indicator">
          <div class="api-dot" data-id="usgs_hour"></div>
          <span class="api-label" data-id="usgs_hour">USGS</span>
        </div>
        <div class="api-indicator">
          <div class="api-dot" data-id="gdacs"></div>
          <span class="api-label" data-id="gdacs">GDACS</span>
        </div>
        <div class="api-indicator">
          <div class="api-dot" data-id="tsunami"></div>
          <span class="api-label" data-id="tsunami">NOAA</span>
        </div>
        <div class="api-indicator">
          <div class="api-dot online" data-id="sim"></div>
          <span class="api-label" data-id="sim">SIM</span>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══ MAIN CONTENT ═══ -->
  <div id="content">

    <!-- ═══ LEFT SIDEBAR ═══ -->
    <aside id="sidebar-left" class="sidebar">

      <!-- Logo -->
      <div class="logo-section">
        <div id="main-logo" data-text="EY">EY</div>
        <div class="logo-subtitle">GLOBAL THREAT MONITOR // LIVE</div>
        <div class="system-status">
          <div class="status-dot"></div>
          <span class="status-text">SISTEMA ACTIVO</span>
        </div>
        <div class="update-timer">
          <span class="update-label">ACTIVO:</span>
          <span id="last-update">00:00:00</span>
        </div>
      </div>

      <!-- Filters -->
      <div>
        <div class="section-title">FILTROS DE AMENAZA</div>
        <div id="filter-list"></div>
      </div>

      <!-- Alert Level -->
      <div>
        <div class="section-title">NIVEL DE ALERTA GLOBAL</div>
        <div class="alert-meter-section">
          <div class="meter-ring">
            <svg class="meter-svg" viewBox="0 0 120 120">
              <circle class="meter-track" cx="60" cy="60" r="54"/>
              <circle id="alert-circle" cx="60" cy="60" r="54"/>
            </svg>
            <div class="meter-center">
              <span id="alert-level-val">0</span>
              <span class="meter-pct">%</span>
            </div>
          </div>
          <div id="alert-status-text">NOMINAL</div>
        </div>
      </div>

      <!-- Stats -->
      <div>
        <div class="section-title">ESTADÍSTICAS</div>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-label">EVENTOS ACTIVOS</span>
            <span class="stat-value" id="stat-events">0</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">PAÍSES</span>
            <span class="stat-value" id="stat-countries">0</span>
          </div>
          <div class="stat-item wide">
            <span class="stat-label">ÚLTIMO EVENTO</span>
            <span class="stat-value" id="stat-last">—</span>
          </div>
        </div>
      </div>

    </aside>

    <!-- ═══ MAP ═══ -->
    <div id="map-container">
      <div id="map"></div>

      <!-- Map controls -->
      <div id="map-controls">
        <button class="map-btn" id="btn-center-world" title="Vista global">⊕ GLOBAL</button>
        <button class="map-btn" id="btn-my-location" title="Mi ubicación">◎ MI POS</button>
        <button class="map-btn" id="btn-fullscreen" title="Pantalla completa">⛶ FULL</button>
      </div>

      <!-- HUD corners (extra) -->
      <div class="hud-corner hud-tl"></div>
      <div class="hud-corner hud-tr"></div>
      <div class="hud-corner hud-bl"></div>
      <div class="hud-corner hud-br"></div>
    </div>

    <!-- ═══ RIGHT SIDEBAR ═══ -->
    <aside id="sidebar-right" class="sidebar">
      <div class="feed-header">
        <div class="feed-header-row">
          <div class="section-title" style="border:none;margin:0;padding:0">FEED EN VIVO</div>
          <div class="live-badge">
            <div class="live-dot"></div>
            <span>LIVE</span>
          </div>
        </div>
      </div>
      <div id="feed-list"></div>
    </aside>

  </div><!-- /#content -->

  <!-- Mobile feed sheet -->
  <div id="feed-sheet">
    <div class="feed-header" style="padding:0 12px 10px 12px;border-bottom:1px solid var(--border);">
      <div class="feed-header-row">
        <div class="section-title" style="border:none;margin:0;padding:0">FEED EN VIVO</div>
        <div class="live-badge"><div class="live-dot"></div><span>LIVE</span></div>
      </div>
    </div>
    <div id="feed-list-mobile"></div>
  </div>

  <!-- Mobile FABs -->
  <div id="mobile-btns" style="display:none">
    <button class="mobile-fab" id="mobile-filter-btn" title="Filtros">⚙</button>
    <button class="mobile-fab" id="mobile-feed-btn" title="Feed">📡</button>
  </div>

</div><!-- /#app -->

<!-- ═══ SCRIPTS ═══ -->
<!-- Leaflet -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- Leaflet MarkerCluster -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>

<!-- App scripts -->
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/alerts.js"></script>
<script src="js/map.js"></script>
<script src="js/feed.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

<!-- Mobile detection -->
<script>
  if (window.innerWidth <= 768) {
    document.getElementById('mobile-btns').style.display = 'flex';
    // Clone feed to sheet
    document.addEventListener('DOMContentLoaded', () => {
      const sheet = document.getElementById('feed-list-mobile');
      const feedObs = new MutationObserver(() => {
        const items = document.querySelectorAll('#feed-list .feed-item');
        sheet.innerHTML = '';
        items.forEach(el => sheet.appendChild(el.cloneNode(true)));
      });
      feedObs.observe(document.getElementById('feed-list'), { childList: true });
    });
  }
</script>

</body>
</html>
